name: codereview

networks:
  codereview-net:
    driver: bridge

services:
  chromadb-codereview:
    image: chromadb/chroma:latest
    container_name: chromadb-codereview
    ports:
      - "8900:8000"
    volumes:
      - ./chromadb-data:/chroma/chroma
    networks:
      - codereview-net
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codereview-api
    ports:
      - "8090:8090"
    volumes:
      - ./app:/app/app
      - ./ui:/app/ui
      - ./style-guides:/app/style-guides
      - ./eval:/app/eval
      - ./suggestions:/app/suggestions
      - ./config:/app/config
    networks:
      - codereview-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - CHROMA_URL=http://chromadb-codereview:8000
      - OLLAMA_MODEL_FAST=qwen3-coder:latest
      - OLLAMA_MODEL_DEEP=deepseek-r1:32b
      - OLLAMA_EMBED_MODEL=nomic-embed-text:latest
      - SUGGESTIONS_FILE=/app/suggestions/custom-rules.json
      - TEAMS_FILE=/app/config/teams.json
    depends_on:
      - chromadb-codereview
    restart: unless-stopped
